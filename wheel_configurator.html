<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RimFix — Конфигуратор дисков</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0c0d0f;
      --surface:    #141518;
      --surface-hi: #1c1e23;
      --border:     #27292f;
      --border-hi:  #3a3d45;
      --accent:     #18df61;
      --accent-dim: rgba(24,223,97,0.12);
      --red:        #e53935;
      --green:      #22c55e;
      --blue:       #60a5fa;
      --text:       #edeef0;
      --muted:      #686c78;
      --muted-hi:   #9299a6;
      --f-display:  'Montserrat', sans-serif;
      --f-ui:       'Montserrat', sans-serif;
      --f-body:     'Montserrat', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html { 
      height: 100%; 
      -webkit-text-size-adjust: 100%; 
      -webkit-tap-highlight-color: transparent;
    }
    body {
      min-height: 100vh;
      font-family: var(--f-body);
      background: linear-gradient(135deg, #1a1c22 0%, #0c0d0f 50%, #1a1c22 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-top: var(--safe-top);
    }

    /* ── STATUS (inside preview) ───────────────────────── */
    .status-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0;
    }
    .status-dot.ready  {
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2), 0 0 6px var(--green);
    }
    .status-dot.error  {
      background: var(--red);
      box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.2);
    }
    .status-dot.active {
      background: var(--accent);
      animation: blink 1.2s infinite;
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status {
      font-family: var(--f-ui);
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .08em;
      color: var(--muted-hi);
      white-space: nowrap;
      min-width: 0;
    }
    #status.success { color: var(--green); }
    #status.error   { color: var(--red); }
    #status.info    { color: var(--blue); }

    /* ── DESKTOP WORKSPACE ──────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - var(--safe-top));
      min-height: 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .sidebar-section {
      display: flex;
      flex-direction: column;
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      min-height: 0;
    }
    .sidebar-section:first-child {
      flex: 2;
    }
    .sidebar-section:nth-child(2) {
      flex: 1;
    }
    .palette-section {
      flex-shrink: 0;
      padding: 10px 10px 11px;
    }

    .sec-label {
      font-family: var(--f-ui);
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .label-chip {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid var(--border-hi);
      flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 2px;
      scrollbar-gutter: stable;
    }
    .item-list::-webkit-scrollbar { width: 4px; }
    .item-list::-webkit-scrollbar-thumb {
      background: var(--border-hi);
      border-radius: 99px;
    }
    .item-list::-webkit-scrollbar-track { background: transparent; }

    .car-item, .wheel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface-hi);
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: all .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .car-item:hover, .wheel-item:hover {
      border-color: var(--border-hi);
      background: var(--surface);
    }
    .car-item:active, .wheel-item:active {
      transform: scale(0.99);
    }
    .car-item.selected, .wheel-item.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }
    .car-item img, .wheel-item img {
      width: 64px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
      opacity: .82;
      transition: opacity .15s;
      border-radius: 4px;
    }
    .car-item.selected img, .wheel-item.selected img {
      opacity: 1;
    }
    .item-label {
      font-family: var(--f-ui);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted-hi);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .car-item.selected .item-label,
    .wheel-item.selected .item-label {
      color: var(--accent);
    }
    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border-hi);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    .car-item.selected .item-check,
    .wheel-item.selected .item-check {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 1px var(--bg);
    }
    .car-item.selected .item-check::after,
    .wheel-item.selected .item-check::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bg);
    }
    .wheel-name { display: none; }

    /* ── PALETTE ────────────────────────────────────────── */
    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(6,1fr);
      gap: 6px;
      margin-bottom: 10px;
    }
    .swatch {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      outline: none;
      padding: 0;
      transition: all .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .swatch:hover {
      transform: scale(1.08);
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .swatch:active {
      transform: scale(1.05);
    }
    .swatch.selected {
      border-color: var(--text);
      box-shadow:
        0 0 0 2px var(--accent),
        0 0 12px rgba(24,223,97,0.5),
        0 4px 12px rgba(0,0,0,0.4);
      transform: scale(1.08);
      z-index: 3;
    }
    .swatch.selected::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .55rem;
      font-weight: 900;
      color: rgba(255,255,255,.95);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .swatch-original {
      background: repeating-conic-gradient(#3a3d45 0% 25%,#1c1e23 0% 50%) 0 0/8px 8px;
      border: 2px solid var(--border-hi);
    }
    .swatch-original.selected {
      border-color: var(--accent);
    }
    .swatch-original.selected::after {
      color: var(--accent);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      padding: 3px 2px;
    }
    .custom-label {
      font-family: var(--f-ui);
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }
    .picker-wrap {
      position: relative;
      width: 42px;
      height: 32px;
      border-radius: 6px;
      border: 2px solid var(--border-hi);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .15s ease;
      background: var(--surface-hi);
    }
    .picker-wrap:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .picker-wrap.active {
      border-color: var(--accent);
      box-shadow:
        0 0 0 2px var(--accent),
        0 0 10px rgba(24,223,97,0.4);
      transform: scale(1.05);
    }
    .picker-wrap input[type="color"] {
      position: absolute; 
      top: -8px; 
      left: -8px;
      width: calc(100% + 16px); 
      height: calc(100% + 16px);
      border: none; 
      padding: 0; 
      cursor: pointer; 
      background: none;
      opacity: 0;
    }
    .color-name {
      font-family: var(--f-ui);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted-hi);
      min-height: 1.1em;
      text-align: center;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color .2s, background .2s;
    }
    .color-name[style*="--text"] {
      background: var(--accent-dim);
      color: var(--accent) !important;
    }

    /* ── PREVIEW ────────────────────────────────────────── */
    .preview-area {
      display: flex; 
      flex-direction: column;
      overflow: hidden; 
      background: var(--bg); 
      position: relative;
      min-height: 0;
    }
    .preview-area::before {
      content: ''; 
      position: absolute; 
      inset: 0; 
      pointer-events: none;
      background-image: 
        linear-gradient(var(--border) 1px,transparent 1px), 
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 40px 40px; 
      opacity: .35;
    }
    .preview-area::after {
      content: ''; 
      position: absolute; 
      bottom: 0; 
      right: 0; 
      width: 320px; 
      height: 320px; 
      pointer-events: none;
      background: radial-gradient(circle at 100% 100%, rgba(24,223,97,.04) 0%,transparent 65%);
    }
    .preview-header {
      position: relative;
      z-index: 2;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      flex-shrink: 0;
      flex-wrap: wrap;
      row-gap: 8px;
      min-height: 56px;
      align-content: center;
    }
    #carName {
      font-family: var(--f-display);
      font-size: 1.8rem;
      letter-spacing: .08em;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hdr-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--f-ui);
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .status-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .preview-stage {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 0;
      overflow: hidden;
    }
    .canvas-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
    }
    .ruler-h, .ruler-v {
      position: absolute;
      background: var(--accent);
      opacity: .35;
      pointer-events: none;
      z-index: 1;
    }
    .ruler-h { top: 0; left: 0; width: 60px; height: 2px; }
    .ruler-v { top: 0; left: 0; width: 2px; height: 40px; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
      padding: 20px;
      text-align: center;
      max-width: 300px;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .empty-icon svg { 
      width: 30px; 
      height: 30px; 
      color: var(--muted); 
    }
    .empty-title {
      font-family: var(--f-ui);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted-hi);
    }
    .empty-hint { 
      font-size: .82rem; 
      color: var(--muted); 
      text-align: center; 
      max-width: 270px;
      line-height: 1.4;
    }
    #carCanvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: opacity .2s ease;
    }
    #carCanvas.loaded {
      opacity: 1;
    }

    /* ── MOBILE ELEMENTS hidden on desktop ──────────────── */
    .mob-tabbar, .mob-sheet, .mob-backdrop { display: none; }

    /* ════════════════════════════════════════════════════
       MOBILE  ≤ 740px
    ════════════════════════════════════════════════════ */
    @media (max-width: 740px) {
      /* preview header on mobile */
      .preview-header {
        padding: 10px 14px;
        flex-wrap: wrap;
        row-gap: 6px;
        column-gap: 12px;
      }
      #carName {
        font-size: 1.25rem;
        font-weight: 700;
        flex: 1 1 100%;
        min-width: 0;
      }
      #status {
        font-size: .8rem;
      }
      .status-wrap {
        order: 2;
        margin-left: auto;
      }

      /* layout: tabbar on bottom, canvas above */
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
        height: calc(100vh - var(--safe-top) - var(--safe-bottom));
        padding-bottom: var(--safe-bottom);
      }
      .sidebar { display: none; }
      .preview-area {
        order: 1;
        border-bottom: 1px solid var(--border);
      }
      .preview-stage {
        padding: 12px; 
        min-height: 200px;
      }
      .empty-state { 
        gap: 12px; 
        padding: 16px;
        max-width: 100%;
      }
      .empty-icon { 
        width: 56px; 
        height: 56px;
      }
      .empty-title { font-size: .95rem; }
      .empty-hint { font-size: .8rem; }

      /* ── TAB BAR ── */
      .mob-tabbar {
        display: flex;
        order: 2;
        border-top: 1px solid var(--border);
        background: var(--surface);
        z-index: 40;
        flex-shrink: 0;
        padding-bottom: var(--safe-bottom);
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
      }
      .mob-tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 10px 4px 14px;
        min-height: 60px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--f-ui);
        font-size: .64rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        position: relative;
        -webkit-tap-highlight-color: transparent;
        transition: all .15s ease;
      }
      .mob-tab svg { 
        width: 24px; 
        height: 24px; 
        stroke: currentColor; 
        fill: none; 
        stroke-width: 1.6;
        transition: transform .15s ease;
      }
      .mob-tab:active svg {
        transform: scale(0.92);
      }
      .mob-tab.active {
        color: var(--accent);
        background: var(--accent-dim);
      }
      .mob-tab.active::after {
        content: ''; 
        position: absolute; 
        bottom: calc(var(--safe-bottom) + 4px); 
        left: 25%; 
        right: 25%;
        height: 2px; 
        background: var(--accent); 
        border-radius: 2px 2px 0 0;
        box-shadow: 0 -1px 4px rgba(24,223,97,0.4);
      }
      .mob-tab.active svg {
        transform: scale(1.08);
      }
      /* small colour dot badge on the colour tab */
      .tab-color-dot {
        position: absolute;
        top: 10px;
        right: calc(50% - 16px);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 2.5px solid var(--bg);
        display: none;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
        transition: transform .2s ease;
      }
      .mob-tab.active .tab-color-dot {
        transform: scale(1.2);
      }

      /* ── BACKDROP ── */
      .mob-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 70;
        background: rgba(0,0,0,0.6);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s ease;
        backdrop-filter: blur(2px);
      }
      .mob-backdrop.open { 
        opacity: 1; 
        pointer-events: all; 
      }

      /* ── BOTTOM SHEET ── */
      .mob-sheet {
        display: flex;
        flex-direction: column;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 80;
        background: var(--surface);
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        max-height: calc(100vh - 52px - var(--safe-top) - 60px - var(--safe-bottom));
        transform: translateY(105%);
        transition: transform .32s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
      }
      .mob-sheet.open { 
        transform: translateY(0); 
      }

      .sheet-handle {
        width: 40px;
        height: 4px;
        background: var(--border-hi);
        border-radius: 4px;
        margin: 10px auto 14px;
        cursor: grab;
        flex-shrink: 0;
        transition: background .2s;
      }
      .sheet-handle:active {
        background: var(--accent);
        cursor: grabbing;
        box-shadow: 0 0 0 2px rgba(24,223,97,0.2);
      }

      .sheet-header {
        flex-shrink: 0; 
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        padding: 4px 18px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sheet-title {
        font-family: var(--f-display);
        font-size: 1.5rem;
        letter-spacing: .08em;
        font-weight: 400;
      }
      .sheet-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px solid var(--border-hi);
        background: var(--surface-hi);
        color: var(--muted-hi);
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: all .15s ease;
        flex-shrink: 0;
      }
      .sheet-close:active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
        transform: scale(0.92);
      }

      .sheet-body {
        flex: 1; 
        overflow-y: auto; 
        padding: 0 16px 24px;
        -webkit-overflow-scrolling: touch;
        scrollbar-gutter: stable;
      }
      .sheet-body::-webkit-scrollbar { 
        width: 4px; 
      }
      .sheet-body::-webkit-scrollbar-thumb { 
        background: var(--border-hi); 
        border-radius: 99px; 
      }
      .sheet-body::-webkit-scrollbar-track { 
        background: transparent; 
      }

      /* items inside sheet — larger tap targets */
      .sheet-body .item-list { 
        flex: none; 
        overflow: visible; 
        gap: 8px; 
        padding-right: 0;
        padding-top: 4px;
      }
      .sheet-body .car-item,
      .sheet-body .wheel-item {
        padding: 14px 16px;
        min-height: 58px;
        border-radius: 6px;
        background: var(--surface-hi);
        border-color: var(--border);
      }
      .sheet-body .car-item:active,
      .sheet-body .wheel-item:active {
        background: var(--surface);
      }
      .sheet-body .car-item.selected,
      .sheet-body .wheel-item.selected {
        background: var(--accent-dim);
        border-color: var(--accent);
      }
      .sheet-body .car-item img,
      .sheet-body .wheel-item img { 
        width: 60px; 
        height: 40px; 
        border-radius: 4px;
        background: rgba(0,0,0,0.1);
        padding: 2px;
      }

<script>
/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
const CAR_TYPES = [

  { id:'hatchback', name:'Хэтчбек',  src:'car_types/hatchback.png' },

  { id:'pickup',    name:'Пикап',    src:'car_types/pickup.png' },
  { id:'uni',       name:'Универсал',src:'car_types/wagon.png' },
];
const WHEEL_TYPES = [
  { id:'wheel1', name:'Диск 1', src:'wheel_types/wheel1.png' },
  { id:'wheel2', name:'Диск 2', src:'wheel_types/wheel2.png' },
];
const PALETTE = [
  { id:'original',    name:'Оригинал',       hex:null },
  { id:'silver',      name:'Серебро',         hex:'#c2c6ce' },
  { id:'anthracite',  name:'Антрацит',        hex:'#454a54' },
  { id:'gblack',      name:'Чёрный глянец',   hex:'#131416' },
  { id:'mwhite',      name:'Белый матовый',   hex:'#e6e7e8' },
  { id:'alumochrome', name:'Алюмохром',       hex:'#8dabbe' },
  { id:'gunmetal',    name:'Ганметалл',       hex:'#3b404e' },
  { id:'bronze',      name:'Бронза',          hex:'#8b6434' },
  { id:'gold',        name:'Золото',          hex:'#c9a840' },
  { id:'copper',      name:'Медь',            hex:'#a0522d' },
  { id:'rosegold',    name:'Розовое золото',  hex:'#c07868' },
  { id:'champagne',   name:'Шампань',         hex:'#b5a87e' },
  { id:'titanium',    name:'Титан',           hex:'#5c6270' },
  { id:'red',         name:'Красный',         hex:'#b91c1c' },
  { id:'blue',        name:'Синий',           hex:'#1e3a8a' },
  { id:'green',       name:'Зелёный',         hex:'#166534' },
  { id:'orange',      name:'Оранжевый',       hex:'#c2420c' },
  { id:'purple',      name:'Фиолетовый',      hex:'#6b21a8' },
];
const REPLACE_PART_SRC = 'other_assets/replace_part.png';
const CAR_ADJ = { sedan:{dx:0,dy:0,rs:1}, hatchback:{dx:0,dy:0,rs:1}, coupe:{dx:0,dy:0,rs:1},
  cabriolet:{dx:0,dy:0,rs:1}, crossover:{dx:0,dy:0,rs:1}, minivan:{dx:0,dy:0,rs:1},
  pickup:{dx:0,dy:0,rs:1}, uni:{dx:0,dy:0,rs:1} };

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let cvReady        = false;
let selectedCar    = null;
let selectedWheel  = null;
let carImage       = null;
let wheelImage     = null;
let commonTemplate = null;
let cleanSnapshot  = null;
let activeTintHex  = null;
let activeTintName = 'Оригинал';

let canvas, ctx;

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
function init() {
  canvas = document.getElementById('carCanvas');
  ctx    = canvas.getContext('2d');
}
init();

/* ══════════════════════════════════════════════════
   OPENCV
══════════════════════════════════════════════════ */
function onOpenCvLoaded() {
  if (typeof cv === 'undefined') { 
    updateStatus('Не удалось загрузить OpenCV.js','error'); 
    return; 
  }
  cv['onRuntimeInitialized'] = () => {
    cvReady = true;
    updateStatus('Конструктор готов','success');
  };
}

/* ══════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════ */
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image(); 
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('Не удалось загрузить: ' + src));
    img.src = src;
  });
}

function updateStatus(text, type) {
  const el = document.getElementById('status');
  const dot = document.getElementById('statusDot');
  el.textContent = text; 
  el.className = type || '';
  dot.className = 'status-dot ' + (type==='success'?'ready':type==='error'?'error':type==='info'?'active':'');
}

/* ══════════════════════════════════════════════════
   COLOUR UI  — single function, updates every element
══════════════════════════════════════════════════ */
function syncColorUI(hex, name) {
  activeTintHex  = hex;
  activeTintName = name;

  // desktop sidebar
  const chip = document.getElementById('labelChip');
  if (chip) { 
    chip.style.background = hex||'transparent'; 
    chip.style.borderColor = hex?'rgba(255,255,255,.2)':'var(--border-hi)'; 
  }
  const cn = document.getElementById('colorName');
  if (cn) { 
    cn.textContent = name; 
    cn.style.color = hex?'var(--text)':'var(--muted-hi)'; 
    cn.style.background = hex ? 'var(--accent-dim)' : 'transparent';
  }

  // mobile sheet colour name
  const cnMob = document.getElementById('colorNameMob');
  if (cnMob) { 
    cnMob.textContent = name; 
    cnMob.style.color = hex?'var(--text)':'var(--muted-hi)';
    cnMob.style.background = hex ? 'var(--accent-dim)' : 'transparent';
  }

  // mobile tab colour dot
  const tabDot = document.getElementById('tabColorDot');
  if (tabDot) { 
    tabDot.style.background = hex||''; 
    tabDot.style.display = hex?'block':'none'; 
  }

  // selected state on ALL swatch grids (desktop + mobile)
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  if (!hex) {
    document.querySelectorAll('.swatch-original').forEach(s => s.classList.add('selected'));
  }
}

function applySwatchSelection(id) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  document.querySelectorAll(`.swatch[data-id="${id}"]`).forEach(s => s.classList.add('selected'));
}

/* ══════════════════════════════════════════════════
   TINTING
══════════════════════════════════════════════════ */
function getTintedWheelCanvas() {
  const w = wheelImage.width, h = wheelImage.height;
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const c2 = off.getContext('2d');
  c2.drawImage(wheelImage, 0, 0);
  if (!activeTintHex) return off;
  const tr = parseInt(activeTintHex.slice(1,3),16);
  const tg = parseInt(activeTintHex.slice(3,5),16);
  const tb = parseInt(activeTintHex.slice(5,7),16);
  const d = c2.getImageData(0,0,w,h); const px = d.data;
  for (let i=0; i<px.length; i+=4) {
    if (px[i+3]===0) continue;
    const lum = (px[i]*.2126 + px[i+1]*.7152 + px[i+2]*.0722)/255;
    px[i]=Math.round(tr*lum); px[i+1]=Math.round(tg*lum); px[i+2]=Math.round(tb*lum);
  }
  c2.putImageData(d,0,0);
  return off;
}

/* ══════════════════════════════════════════════════
   SELECT HANDLERS  (shared by desktop + mobile)
══════════════════════════════════════════════════ */
async function selectCar(car) {
  selectedCar = car;
  document.querySelectorAll('.car-item').forEach(el => 
    el.classList.toggle('selected', el.dataset.carId===car.id)
  );
  document.getElementById('carName').textContent = car.name;
  if (!cvReady) { 
    updateStatus('OpenCV.js ещё инициализируется…','info'); 
    return; 
  }
  updateStatus('Загрузка кузова…','info');
  try {
    carImage = await loadImage(car.src);
    canvas.width = carImage.width; 
    canvas.height = carImage.height;
    ctx.drawImage(carImage,0,0);
    cleanSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
    canvas.style.display = 'block';
    canvas.classList.add('loaded');
    document.getElementById('emptyState').style.display = 'none';
    if (selectedWheel) await applyWheelsWithOpenCV();
    else updateStatus('Теперь выберите диски','info');
  } catch(e) { 
    updateStatus('Ошибка: '+e.message,'error'); 
  }
}

async function selectWheel(wheel) {
  selectedWheel = wheel;
  document.querySelectorAll('.wheel-item').forEach(el => 
    el.classList.toggle('selected', el.dataset.wheelId===wheel.id)
  );
  if (!cvReady) { 
    updateStatus('OpenCV.js ещё инициализируется…','info'); 
    return; 
  }
  updateStatus('Загрузка диска…','info');
  try {
    wheelImage = await loadImage(wheel.src);
    if (selectedCar) await applyWheelsWithOpenCV();
    else updateStatus('Выберите кузов','info');
  } catch(e) { 
    updateStatus('Ошибка: '+e.message,'error'); 
  }
}

async function rerenderWheels() {
  if (selectedCar && selectedWheel && cvReady) {
    await applyWheelsWithOpenCV();
  }
}

/* ══════════════════════════════════════════════════
   OPENCV MATCHING
══════════════════════════════════════════════════ */
function analyzeTemplate(image) {
  const c = document.createElement('canvas'); 
  c.width=image.width; 
  c.height=image.height;
  const cx = c.getContext('2d'); 
  cx.drawImage(image,0,0);
  const d = cx.getImageData(0,0,c.width,c.height).data; 
  const pts=[];
  for (let y=0;y<c.height;y++) for (let x=0;x<c.width;x++) {
    const i=(y*c.width+x)*4; 
    if ((d[i]+d[i+1]+d[i+2])/3>30) pts.push({x,y});
  }
  if (!pts.length) return {centerX:c.width/2,centerY:c.height/2,radius:Math.min(c.width,c.height)/2};
  let sx=0,sy=0,mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  for (const p of pts) { 
    sx+=p.x;sy+=p.y;
    if(p.x<mnX)mnX=p.x;if(p.x>mxX)mxX=p.x;
    if(p.y<mnY)mnY=p.y;if(p.y>mxY)mxY=p.y; 
  }
  return {centerX:sx/pts.length,centerY:sy/pts.length,radius:Math.max(mxX-mnX,mxY-mnY)/2};
}
async function getTemplate() {
  if (commonTemplate) return commonTemplate;
  const img=await loadImage(REPLACE_PART_SRC); 
  const b=analyzeTemplate(img);
  commonTemplate={image:img,...b}; 
  return commonTemplate;
}
function makeTmpCanvas(img) { 
  const c=document.createElement('canvas');
  c.width=img.width;c.height=img.height;
  c.getContext('2d').drawImage(img,0,0);
  return c; 
}
function findTopN(mat,n,minS) {
  const matches=[]; 
  const {rows,cols}=mat; 
  const d=mat.data32F;
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) { 
    const s=d[y*cols+x]; 
    if(s>=minS) matches.push({x,y,score:s}); 
  }
  matches.sort((a,b)=>b.score-a.score);
  const out=[];
  for(const m of matches){ 
    let ok=true; 
    for(const p of out){
      const dx=m.x-p.x,dy=m.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<10){ok=false;break;}
    } 
    if(ok){
      out.push(m);
      if(out.length>=n)break;
    } 
  }
  return out;
}

async function applyWheelsWithOpenCV() {
  if (!carImage||!wheelImage||!selectedCar||!cvReady) return;
  const base=await getTemplate(); 
  if (!base){
    updateStatus('Нет шаблона','error');
    return;
  }
  const adj=CAR_ADJ[selectedCar.id]||{dx:0,dy:0,rs:1};
  const tpl={image:base.image,centerX:base.centerX+adj.dx,centerY:base.centerY+adj.dy,radius:base.radius*adj.rs};
  updateStatus('Поиск колёс…','info');
  ctx.putImageData(cleanSnapshot,0,0);
  let src=null,tmpl=null,sg=null,tg=null,res=null,ss=null,ts=null;
  try {
    src=cv.imread(makeTmpCanvas(carImage)); 
    tmpl=cv.imread(makeTmpCanvas(tpl.image));
    sg=new cv.Mat(); 
    tg=new cv.Mat();
    cv.cvtColor(src,sg,cv.COLOR_RGBA2GRAY); 
    cv.cvtColor(tmpl,tg,cv.COLOR_RGBA2GRAY);
    const sc=0.5; 
    ss=new cv.Mat(); 
    ts=new cv.Mat();
    cv.resize(sg,ss,new cv.Size(Math.round(sg.cols*sc),Math.round(sg.rows*sc)),0,0,cv.INTER_AREA);
    cv.resize(tg,ts,new cv.Size(Math.round(tg.cols*sc),Math.round(tg.rows*sc)),0,0,cv.INTER_AREA);
    res=new cv.Mat.zeros(ss.rows-ts.rows+1,ss.cols-ts.cols+1,cv.CV_32FC1);
    cv.matchTemplate(ss,ts,res,cv.TM_CCOEFF_NORMED);
    cv.normalize(res,res,0,1,cv.NORM_MINMAX,-1);
    const msm=findTopN(res,2,0.6); 
    if(!msm.length){
      updateStatus('Колёса не найдены','error');
      return;
    }
    const matches=msm.map(m=>({x:m.x/sc,y:m.y/sc})).sort((a,b)=>a.x-b.x);
    const wsz=tpl.radius*0.9*1.5*2;
    const tw=getTintedWheelCanvas();
    for(const m of matches) {
      ctx.drawImage(tw,0,0,tw.width,tw.height,
        m.x+tpl.centerX-wsz/2,
        m.y+tpl.centerY-wsz/2,
        wsz,wsz
      );
    }
    updateStatus('Диски установлены · '+activeTintName,'success');
  } catch(e){
    console.error(e);
    updateStatus('Ошибка OpenCV: '+e.message,'error');
  }
  finally { 
    [src,tmpl,sg,tg,res,ss,ts].forEach(m=>{
      try{if(m)m.delete();}catch(_){}
    }); 
  }
}

/* ══════════════════════════════════════════════════
   BUILD LISTS  (desktop + mobile share same data-* attrs)
══════════════════════════════════════════════════ */
function makeCarItem(car) {
  const d=document.createElement('div'); 
  d.className='car-item'; 
  d.dataset.carId=car.id;
  d.setAttribute('role', 'button');
  d.setAttribute('tabindex', '0');
  d.innerHTML=`<img src="${car.src}" alt="${car.name}" loading="lazy"><span class="item-label">${car.name}</span><span class="item-check"></span>`;
  return d;
}
function makeWheelItem(wheel) {
  const d=document.createElement('div'); 
  d.className='wheel-item'; 
  d.dataset.wheelId=wheel.id;
  d.setAttribute('role', 'button');
  d.setAttribute('tabindex', '0');
  d.innerHTML=`<img src="${wheel.src}" alt="${wheel.name}" loading="lazy"><span class="item-label">${wheel.name}</span><span class="item-check"></span><div class="wheel-name">${wheel.name}</div>`;
  return d;
}
function makeSwatch(p) {
  const b=document.createElement('button');
  b.className='swatch'+(p.id==='original'?' swatch-original':'');
  b.dataset.id=p.id; 
  b.title=p.name;
  b.setAttribute('aria-label', `Выбрать цвет: ${p.name}`);
  if(p.hex) b.style.background=p.hex;
  return b;
}

function initLists() {
  const carListD  = document.getElementById('carList');
  const carListM  = document.getElementById('carListMob');
  const whlListD  = document.getElementById('wheelList');
  const whlListM  = document.getElementById('wheelListMob');
  const swGridD   = document.getElementById('swatchGrid');
  const swGridM   = document.getElementById('swatchGridMob');

  /* cars */
  CAR_TYPES.forEach(car => {
    [carListD, carListM].forEach(list => {
      const el = makeCarItem(car);
      el.onclick = () => { selectCar(car); closeSheet(); };
      el.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectCar(car); 
          closeSheet();
        }
      };
      list.appendChild(el);
    });
  });

  /* wheels */
  WHEEL_TYPES.forEach(wheel => {
    [whlListD, whlListM].forEach(list => {
      const el = makeWheelItem(wheel);
      el.onclick = () => { selectWheel(wheel); closeSheet(); };
      el.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectWheel(wheel); 
          closeSheet();
        }
      };
      list.appendChild(el);
    });
  });

  /* palette */
  PALETTE.forEach(p => {
    [swGridD, swGridM].forEach(grid => {
      const btn = makeSwatch(p);
      if (p.id==='original') btn.classList.add('selected');
      btn.onclick = () => {
        applySwatchSelection(p.id);
        syncColorUI(p.hex, p.name);
        // reset custom picker active state
        document.getElementById('pickerWrap').classList.remove('active');
        document.getElementById('pickerWrapMob').classList.remove('active');
        rerenderWheels();
      };
      grid.appendChild(btn);
    });
  });

  /* custom pickers — keep both in sync */
  function onCustomColor(hex) {
    const name = 'Свой · ' + hex.toUpperCase();
    document.getElementById('customPicker').value    = hex;
    document.getElementById('customPickerMob').value = hex;
    document.getElementById('pickerWrap').style.background    = hex;
    document.getElementById('pickerWrapMob').style.background = hex;
    document.getElementById('pickerWrap').classList.add('active');
    document.getElementById('pickerWrapMob').classList.add('active');
    applySwatchSelection('__none__'); // deselects all
    syncColorUI(hex, name);
    rerenderWheels();
  }
  document.getElementById('customPicker').addEventListener('input', e => onCustomColor(e.target.value));
  document.getElementById('customPickerMob').addEventListener('input', e => onCustomColor(e.target.value));

  syncColorUI(null,'Оригинал');
}

/* ══════════════════════════════════════════════════
   MOBILE SHEET LOGIC
══════════════════════════════════════════════════ */
const SHEET_MAP = { car:'sheetCar', wheel:'sheetWheel', color:'sheetColor' };
const TAB_MAP   = { car:'tabBtnCar', wheel:'tabBtnWheel', color:'tabBtnColor' };

function openSheet(which) {
  // Close any open sheet first
  closeSheet();
  
  const sheet = document.getElementById(SHEET_MAP[which]);
  if (!sheet) return;
  
  // Open the sheet
  sheet.classList.add('open');
  document.getElementById('mobBackdrop').classList.add('open');
  document.getElementById(TAB_MAP[which]).classList.add('active');
  
  // Prevent body scroll when sheet is open
  document.body.style.overflow = 'hidden';
  
  // Focus the first interactive element for accessibility
  setTimeout(() => {
    const firstFocusable = sheet.querySelector('button, [tabindex="0"]');
    if (firstFocusable) firstFocusable.focus();
  }, 300);
}

function closeSheet() {
  // Close all sheets
  Object.values(SHEET_MAP).forEach(id => {
    const sheet = document.getElementById(id);
    if (sheet) sheet.classList.remove('open');
  });
  
  // Close backdrop
  const backdrop = document.getElementById('mobBackdrop');
  if (backdrop) backdrop.classList.remove('open');
  
  // Deactivate all tabs
  document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
  
  // Restore body scroll
  document.body.style.overflow = '';
}

// Close sheet on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeSheet();
  }
});

// Handle sheet handle drag (visual feedback only for now)
document.querySelectorAll('.sheet-handle').forEach(handle => {
  let startY = 0;
  let startTransform = 0;
  
  handle.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
    const sheet = handle.closest('.mob-sheet');
    const transform = sheet.style.transform;
    const match = transform.match(/translateY\(([^)]+)\)/);
    startTransform = match ? parseFloat(match[1]) : 0;
  }, { passive: true });
  
  handle.addEventListener('touchmove', (e) => {
    // Visual feedback only - full drag implementation would require more code
    const deltaY = e.touches[0].clientY - startY;
    if (deltaY > 0) {
      const sheet = handle.closest('.mob-sheet');
      const progress = Math.min(1, deltaY / 200);
      sheet.style.transform = `translateY(${progress * 100}%)`;
    }
  }, { passive: true });
  
  handle.addEventListener('touchend', (e) => {
    const sheet = handle.closest('.mob-sheet');
    const deltaY = e.changedTouches[0].clientY - startY;
    
    // If dragged down more than 30% of sheet height, close it
    if (deltaY > 80) {
      closeSheet();
    } else {
      // Snap back to open position
      sheet.style.transform = 'translateY(0)';
    }
  });
});

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
window.onload = function() {
  initLists();
  
  // Add loaded class to canvas when image is ready
  const originalDrawImage = ctx.drawImage;
  ctx.drawImage = function() {
    const result = originalDrawImage.apply(this, arguments);
    if (canvas.style.display !== 'none') {
      canvas.classList.add('loaded');
    }
    return result;
  };
};

// Handle window resize for proper canvas sizing
window.addEventListener('resize', () => {
  if (carImage && canvas.style.display !== 'none') {
    // Redraw on resize to maintain proper scaling
    ctx.drawImage(carImage, 0, 0);
    if (cleanSnapshot) {
      cleanSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
    }
    if (selectedWheel && cvReady) {
      applyWheelsWithOpenCV();
    }
  }
});
