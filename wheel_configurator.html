<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RimFix — Конфигуратор дисков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0c0d0f;
            --surface: #141518;
            --surface-hi: #1c1e23;
            --border: #27292f;
            --border-hi: #3a3d45;
            --accent: #18df61;
            --accent-dim: rgba(24, 223, 97, 0.12);
            --red: #e53935;
            --green: #22c55e;
            --blue: #60a5fa;
            --text: #edeef0;
            --muted: #686c78;
            --muted-hi: #9299a6;
            --f: 'Montserrat', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            font-family: var(--f);
            background: linear-gradient(135deg, #1a1c22 0%, #0c0d0f 50%, #1a1c22 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            padding-top: var(--safe-top);
        }

        /* ── STATUS (inside preview) ───────────────────────── */
        .status-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            transition: background .3s, box-shadow .3s;
            flex-shrink: 0;
        }

        .status-dot.ready {
            background: var(--green);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2), 0 0 6px var(--green);
        }

        .status-dot.error {
            background: var(--red);
            box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.2);
        }

        .status-dot.active {
            background: var(--accent);
            animation: blink 1.2s infinite;
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        #status {
            font-family: var(--f);
            font-size: .85rem;
            font-weight: 600;
            letter-spacing: .08em;
            color: var(--muted-hi);
            white-space: nowrap;
            min-width: 0;
        }

        #status.success {
            color: var(--green);
        }

        #status.error {
            color: var(--red);
        }

        #status.info {
            color: var(--blue);
        }

        /* ── DESKTOP WORKSPACE ──────────────────────────────── */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - var(--safe-top));
            min-height: 0;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── SIDEBAR ────────────────────────────────────────── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            padding: 10px 10px;
            border-bottom: 1px solid var(--border);
            min-height: 0;
        }

        .sidebar-section:first-child {
            flex: 2;
        }

        .sidebar-section:nth-child(2) {
            flex: 1;
        }

        .palette-section {
            flex-shrink: 0;
            padding: 10px 10px 11px;
        }

        .sec-label {
            font-family: var(--f);
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            padding-bottom: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sec-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .label-chip {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            border: 2px solid var(--border-hi);
            flex-shrink: 0;
            transition: background .2s, border-color .2s;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            padding-right: 2px;
            scrollbar-gutter: stable;
        }

        .item-list::-webkit-scrollbar {
            width: 4px;
        }

        .item-list::-webkit-scrollbar-thumb {
            background: var(--border-hi);
            border-radius: 99px;
        }

        .item-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .car-item,
        .wheel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--surface-hi);
            border: 1.5px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .15s ease;
        }

        .wheel-item:hover {
            border-color: var(--border-hi);
            background: var(--surface);
        }

        .car-item:active,
        .wheel-item:active {
            transform: scale(0.99);
        }

        .car-item.selected,
        .wheel-item.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            box-shadow: 0 0 0 1px var(--accent-dim);
        }

        .car-item img,
        .wheel-item img {
            width: 64px;
            height: 40px;
            object-fit: contain;
            flex-shrink: 0;
            opacity: .82;
            transition: opacity .15s;
            border-radius: 4px;
        }

        .car-item.selected img,
        .wheel-item.selected img {
            opacity: 1;
        }

        .item-label {
            font-family: var(--f);
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: .06em;
            color: var(--muted-hi);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .car-item.selected .item-label,
        .wheel-item.selected .item-label {
            color: var(--accent);
        }

        .item-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border-hi);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .car-item.selected .item-check,
        .wheel-item.selected .item-check {
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 0 0 1px var(--bg);
        }

        .car-item.selected .item-check::after,
        .wheel-item.selected .item-check::after {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--bg);
        }

        .wheel-name {
            display: none;
        }

        /* ── PALETTE ────────────────────────────────────────── */
        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .swatch {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            outline: none;
            padding: 0;
            transition: all .15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .swatch:hover {
            transform: scale(1.08);
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .swatch:active {
            transform: scale(1.05);
        }

        .swatch.selected {
            border-color: var(--text);
            box-shadow:
                0 0 0 2px var(--accent),
                0 0 12px rgba(24, 223, 97, 0.5),
                0 4px 12px rgba(0, 0, 0, 0.4);
            transform: scale(1.08);
            z-index: 3;
        }

        .swatch.selected::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .55rem;
            font-weight: 900;
            color: rgba(255, 255, 255, .95);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            animation: popIn .2s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .swatch-original {
            background: repeating-conic-gradient(#3a3d45 0% 25%, #1c1e23 0% 50%) 0 0/8px 8px;
            border: 2px solid var(--border-hi);
        }

        .swatch-original.selected {
            border-color: var(--accent);
        }

        .swatch-original.selected::after {
            color: var(--accent);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .custom-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            padding: 3px 2px;
        }

        .custom-label {
            font-family: var(--f);
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            flex: 1;
        }

        .picker-wrap {
            position: relative;
            width: 42px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid var(--border-hi);
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
            transition: all .15s ease;
            background: var(--surface-hi);
        }

        .picker-wrap:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .picker-wrap.active {
            border-color: var(--accent);
            box-shadow:
                0 0 0 2px var(--accent),
                0 0 10px rgba(24, 223, 97, 0.4);
            transform: scale(1.05);
        }

        .picker-wrap input[type="color"] {
            position: absolute;
            top: -8px;
            left: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
            opacity: 0;
        }

        .color-name {
            font-family: var(--f);
            font-size: .9rem;
            font-weight: 600;
            letter-spacing: .06em;
            color: var(--muted-hi);
            min-height: 1.1em;
            text-align: center;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color .2s, background .2s;
        }

        .color-name[style*="--text"] {
            background: var(--accent-dim);
            color: var(--accent) !important;
        }

        /* ── PREVIEW ────────────────────────────────────────── */
        .preview-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            position: relative;
            min-height: 0;
        }

        .preview-area::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: .35;
        }

        .preview-area::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 320px;
            height: 320px;
            pointer-events: none;
            background: radial-gradient(circle at 100% 100%, rgba(24, 223, 97, .04) 0%, transparent 65%);
        }

        .preview-header {
            position: relative;
            z-index: 2;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg);
            flex-shrink: 0;
            flex-wrap: wrap;
            row-gap: 8px;
            min-height: 56px;
            align-content: center;
        }

        #carName {
            font-family: var(--f);
            font-size: 1.8rem;
            letter-spacing: .08em;
            flex: 1 1 auto;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hdr-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--f);
            font-size: .85rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }

        .status-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .preview-stage {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            min-height: 0;
            overflow: hidden;
        }

        .canvas-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── RULERS (UPDATED FOR ALL CORNERS) ──────────────── */
        .ruler-h,
        .ruler-v {
            position: absolute;
            background: var(--accent);
            opacity: .35;
            pointer-events: none;
            z-index: 1;
        }

        /* Base Top-Left */
        .ruler-h {
            top: 0;
            left: 0;
            width: 60px;
            height: 2px;
        }

        .ruler-v {
            top: 0;
            left: 0;
            width: 2px;
            height: 40px;
        }

        /* Modifiers */
        .ruler-h.right {
            left: auto;
            right: 0;
        }

        .ruler-v.right {
            left: auto;
            right: 0;
        }

        .ruler-h.bottom {
            top: auto;
            bottom: 0;
        }

        .ruler-v.bottom {
            top: auto;
            bottom: 0;
        }

        /* ── EMPTY STATE ───────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: none;
            padding: 20px;
            text-align: center;
            max-width: 300px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--surface-hi);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        }

        .empty-icon svg {
            width: 30px;
            height: 30px;
            color: var(--muted);
        }

        .empty-title {
            font-family: var(--f);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted-hi);
        }

        .empty-hint {
            font-size: .82rem;
            color: var(--muted);
            text-align: center;
            max-width: 270px;
            line-height: 1.4;
        }

        #carCanvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            border-radius: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: opacity .2s ease;
        }

        #carCanvas.loaded {
            opacity: 1;
        }

        /* ── MOBILE ELEMENTS hidden on desktop ──────────────── */
        .mob-tabbar,
        .mob-sheet,
        .mob-backdrop {
            display: none;
        }

        /* ════════════════════════════════════════════════════
MOBILE  ≤ 740px
════════════════════════════════════════════════════ */
        @media (max-width: 740px) {

            /* preview header on mobile */
            .preview-header {
                padding: 10px 14px;
                flex-wrap: wrap;
                row-gap: 6px;
                column-gap: 12px;
            }

            #carName {
                font-size: 1.25rem;
                font-weight: 700;
                flex: 1 1 100%;
                min-width: 0;
            }

            #status {
                font-size: .8rem;
            }

            .status-wrap {
                order: 2;
                margin-left: auto;
            }

            /* layout: tabbar on bottom, canvas above */
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
                height: calc(100vh - var(--safe-top) - var(--safe-bottom));
                padding-bottom: var(--safe-bottom);
            }

            .sidebar {
                display: none;
            }

            .preview-area {
                order: 1;
                border-bottom: 1px solid var(--border);
            }

            .preview-stage {
                padding: 12px;
                min-height: 200px;
            }

            .empty-state {
                gap: 12px;
                padding: 16px;
                max-width: 100%;
            }

            .empty-icon {
                width: 56px;
                height: 56px;
            }

            .empty-title {
                font-size: .95rem;
            }

            .empty-hint {
                font-size: .8rem;
            }

            /* ── TAB BAR ── */
            .mob-tabbar {
                display: flex;
                order: 2;
                border-top: 1px solid var(--border);
                background: var(--surface);
                z-index: 40;
                flex-shrink: 0;
                padding-bottom: var(--safe-bottom);
                position: sticky;
                bottom: 0;
                left: 0;
                right: 0;
                box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.15);
            }

            .mob-tab {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 10px 4px 14px;
                min-height: 60px;
                border: none;
                background: transparent;
                color: var(--muted);
                cursor: pointer;
                font-family: var(--f);
                font-size: .64rem;
                font-weight: 700;
                letter-spacing: .12em;
                text-transform: uppercase;
                position: relative;
                -webkit-tap-highlight-color: transparent;
                transition: all .15s ease;
            }

            .mob-tab svg {
                width: 24px;
                height: 24px;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.6;
                transition: transform .15s ease;
            }

            .mob-tab:active svg {
                transform: scale(0.92);
            }

            .mob-tab.active {
                color: var(--accent);
                background: var(--accent-dim);
            }

            .mob-tab.active::after {
                content: '';
                position: absolute;
                bottom: calc(var(--safe-bottom) + 4px);
                left: 25%;
                right: 25%;
                height: 2px;
                background: var(--accent);
                border-radius: 2px 2px 0 0;
                box-shadow: 0 -1px 4px rgba(24, 223, 97, 0.4);
            }

            .mob-tab.active svg {
                transform: scale(1.08);
            }

            /* small colour dot badge on the colour tab */
            .tab-color-dot {
                position: absolute;
                top: 10px;
                right: calc(50% - 16px);
                width: 8px;
                height: 8px;
                border-radius: 50%;
                border: 2.5px solid var(--bg);
                display: none;
                box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3);
                transition: transform .2s ease;
            }

            .mob-tab.active .tab-color-dot {
                transform: scale(1.2);
            }

            /* ── BACKDROP ── */
            .mob-backdrop {
                display: block;
                position: fixed;
                inset: 0;
                z-index: 70;
                background: rgba(0, 0, 0, 0.6);
                opacity: 0;
                pointer-events: none;
                transition: opacity .25s ease;
                backdrop-filter: blur(2px);
            }

            .mob-backdrop.open {
                opacity: 1;
                pointer-events: all;
            }

            /* ── BOTTOM SHEET ── */
            .mob-sheet {
                display: flex;
                flex-direction: column;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 80;
                background: var(--surface);
                border-top: 1px solid var(--border);
                border-radius: 16px 16px 0 0;
                max-height: calc(100vh - 52px - var(--safe-top) - 60px - var(--safe-bottom));
                transform: translateY(105%);
                transition: transform .32s cubic-bezier(0.16, 1, 0.3, 1);
                overflow: hidden;
                box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
            }

            .mob-sheet.open {
                transform: translateY(0);
            }

            .sheet-handle {
                width: 40px;
                height: 4px;
                background: var(--border-hi);
                border-radius: 4px;
                margin: 10px auto 14px;
                cursor: grab;
                flex-shrink: 0;
                transition: background .2s;
            }

            .sheet-handle:active {
                background: var(--accent);
                cursor: grabbing;
                box-shadow: 0 0 0 2px rgba(24, 223, 97, 0.2);
            }

            .sheet-header {
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 4px 18px 12px;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
                position: sticky;
                top: 0;
                z-index: 2;
            }

            .sheet-title {
                font-family: var(--f);
                font-size: 1.5rem;
                letter-spacing: .08em;
                font-weight: 400;
            }

            .sheet-close {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid var(--border-hi);
                background: var(--surface-hi);
                color: var(--muted-hi);
                cursor: pointer;
                font-size: 1.1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-tap-highlight-color: transparent;
                transition: all .15s ease;
                flex-shrink: 0;
            }

            .sheet-close:active {
                border-color: var(--accent);
                color: var(--accent);
                background: var(--accent-dim);
                transform: scale(0.92);
            }

            .sheet-body {
                flex: 1;
                overflow-y: auto;
                padding: 0 16px 24px;
                -webkit-overflow-scrolling: touch;
                scrollbar-gutter: stable;
            }

            .sheet-body::-webkit-scrollbar {
                width: 4px;
            }

            .sheet-body::-webkit-scrollbar-thumb {
                background: var(--border-hi);
                border-radius: 99px;
            }

            .sheet-body::-webkit-scrollbar-track {
                background: transparent;
            }

            /* items inside sheet — larger tap targets */
            .sheet-body .item-list {
                flex: none;
                overflow: visible;
                gap: 8px;
                padding-right: 0;
                padding-top: 4px;

    <script>
        /* ══════════════════════════════════════════════════

        ══════════════════════════════════════════════════ */
        const CAR_TYPES = [

            { id: 'hatchback', name: 'Хэтчбек',   src: ASSETS.car_types.hatchback },
            { id: 'coupe',     name: 'Купе',       src: ASSETS.car_types.coupe },

            { id: 'crossover', name: 'Кроссовер',  src: ASSETS.car_types.crossover },

        ];
        const WHEEL_TYPES = [
            { id: 'wheel1', name: 'Диск 1', src: ASSETS.wheel_types.wheel1 },

        ];
        const PALETTE = [
            { id: 'original',   name: 'Оригинал',        hex: null },
            { id: 'silver',     name: 'Серебро',          hex: '#c2c6ce' },
            { id: 'anthracite', name: 'Антрацит',         hex: '#454a54' },
            { id: 'gblack',     name: 'Чёрный глянец',    hex: '#131416' },
            { id: 'mwhite',     name: 'Белый матовый',    hex: '#e6e7e8' },
            { id: 'alumochrome',name: 'Алюмохром',        hex: '#8dabbe' },
            { id: 'gunmetal',   name: 'Ганметалл',        hex: '#3b404e' },
            { id: 'bronze',     name: 'Бронза',           hex: '#8b6434' },
            { id: 'gold',       name: 'Золото',           hex: '#c9a840' },
            { id: 'copper',     name: 'Медь',             hex: '#a0522d' },
            { id: 'rosegold',   name: 'Розовое золото',   hex: '#c07868' },
            { id: 'champagne',  name: 'Шампань',          hex: '#b5a87e' },
            { id: 'titanium',   name: 'Титан',            hex: '#5c6270' },
            { id: 'red',        name: 'Красный',          hex: '#b91c1c' },
            { id: 'blue',       name: 'Синий',            hex: '#1e3a8a' },
            { id: 'green',      name: 'Зелёный',          hex: '#166534' },
            { id: 'orange',     name: 'Оранжевый',        hex: '#c2420c' },
            { id: 'purple',     name: 'Фиолетовый',       hex: '#6b21a8' },
        ];
        const REPLACE_PART_SRC = ASSETS.replace_part;
        const CAR_ADJ = {
            sedan:     { dx: 0, dy: 0, rs: 1 },
            hatchback: { dx: 0, dy: 0, rs: 1 },
            coupe:     { dx: 0, dy: 0, rs: 1 },
            cabriolet: { dx: 0, dy: 0, rs: 1 },
            crossover: { dx: 0, dy: 0, rs: 1 },
            minivan:   { dx: 0, dy: 0, rs: 1 },
            pickup:    { dx: 0, dy: 0, rs: 1 },
            uni:       { dx: 0, dy: 0, rs: 1 },
        };

        /* ══════════════════════════════════════════════════
        STATE
        ══════════════════════════════════════════════════ */
        let cvReady = false;
        let selectedCar = null;
        let selectedWheel = null;
        let carImage = null;
        let wheelImage = null;
        let commonTemplate = null;
        let cleanSnapshot = null;
        let activeTintHex = null;
        let activeTintName = 'Оригинал';
        let canvas, ctx;

        // Cache: src → HTMLImageElement  (avoids redundant network fetches)
        const imageCache = new Map();

        // Cache: `${wheelId}::${tintHex}` → offscreen Canvas
        // Invalidated whenever wheelImage or tint changes
        let tintCache = null;      // { key: string, canvas: HTMLCanvasElement }

        // Cached DOM references for hot-path nodes
        let domRefs = {};

        /* ══════════════════════════════════════════════════
        DEBOUNCE
        ══════════════════════════════════════════════════ */
        function debounce(fn, ms) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), ms);
            };
        }

        /* ══════════════════════════════════════════════════
        INIT
        ══════════════════════════════════════════════════ */
        function init() {
            canvas = document.getElementById('carCanvas');
            ctx = canvas.getContext('2d');
            // Cache frequently accessed DOM nodes once at startup
            domRefs = {
                carName:      document.getElementById('carName'),
                status:       document.getElementById('status'),
                statusDot:    document.getElementById('statusDot'),
                emptyState:   document.getElementById('emptyState'),
                labelChip:    document.getElementById('labelChip'),
                colorName:    document.getElementById('colorName'),
                colorNameMob: document.getElementById('colorNameMob'),
                tabColorDot:  document.getElementById('tabColorDot'),
                pickerWrap:   document.getElementById('pickerWrap'),
                pickerWrapMob:document.getElementById('pickerWrapMob'),
                customPicker:    document.getElementById('customPicker'),
                customPickerMob: document.getElementById('customPickerMob'),
                backdrop:     document.getElementById('mobBackdrop'),
                sheets: {
                    car:   document.getElementById('sheetCar'),
                    wheel: document.getElementById('sheetWheel'),
                    color: document.getElementById('sheetColor'),
                },
                tabs: {
                    car:   document.getElementById('tabBtnCar'),
                    wheel: document.getElementById('tabBtnWheel'),
                    color: document.getElementById('tabBtnColor'),
                },
            };
        }
        init();

        /* ══════════════════════════════════════════════════
        OPENCV — dynamic loader with infinite retry
        ══════════════════════════════════════════════════ */
        const CV_SRC = 'opencv.js';
        const RETRY_DELAY_MS = 3000;
        let cvLoadAttempt = 0;

        function loadOpenCV() {
            cvLoadAttempt++;
            updateStatus(
                cvLoadAttempt === 1
                    ? 'Загрузка OpenCV.js…'
                    : 'Повторная попытка ' + cvLoadAttempt + '…',
                'info'
            );

            // Remove any previous (failed) script tag
            const prev = document.getElementById('cv-script');
            if (prev) prev.remove();

            const script = document.createElement('script');
            script.id = 'cv-script';
            // No cache-bust query string: on file:// protocol it's useless and
            // some browsers refuse to load file:// URLs with a query component.
            // The auto-retry on onerror still handles genuinely failed loads.
            script.src = CV_SRC;
            script.async = true;

            script.onload = function () {
                // The WASM runtime may still be initialising after the JS file loads
                if (typeof cv === 'undefined') {
                    // cv global not yet available — shouldn't normally happen, but guard anyway
                    updateStatus('OpenCV.js загружен, ожидание WASM…', 'info');
                    const poll = setInterval(function () {
                        if (typeof cv !== 'undefined') {
                            clearInterval(poll);
                            cv['onRuntimeInitialized'] = onCvReady;
                            // In case WASM was already ready before we set the callback:
                            if (cv.getBuildInformation) onCvReady();
                        }
                    }, 200);
                    return;
                }
                if (cv.getBuildInformation) {
                    // WASM already fully initialised
                    onCvReady();
                } else {
                    // Still compiling WASM — wait for the callback
                    cv['onRuntimeInitialized'] = onCvReady;
                }
            };

            script.onerror = function () {
                updateStatus(
                    'Не удалось загрузить OpenCV.js (попытка ' + cvLoadAttempt + '), повтор через ' + (RETRY_DELAY_MS / 1000) + ' с…',
                    'error'
                );
                setTimeout(loadOpenCV, RETRY_DELAY_MS);
            };

            document.head.appendChild(script);
        }

        function onCvReady() {
            cvReady = true;
            updateStatus('Конструктор готов', 'success');
        }

        /* ══════════════════════════════════════════════════
        UTILITIES
        ══════════════════════════════════════════════════ */
        function loadImage(src) {
            if (imageCache.has(src)) return Promise.resolve(imageCache.get(src));
            return new Promise((res, rej) => {
                const img = new Image();
                // Images are embedded as base64 data URIs (see assets.js), so
                // they are same-origin and never taint the canvas — the app
                // works by double-clicking the HTML with no server required.
                img.onload = () => { imageCache.set(src, img); res(img); };
                img.onerror = () => rej(new Error('Не удалось загрузить: ' + src));
                img.src = src;
            });
        }
        function updateStatus(text, type) {
            domRefs.status.textContent = text;
            domRefs.status.className = type || '';
            domRefs.statusDot.className = 'status-dot ' + (
                type === 'success' ? 'ready' :
                type === 'error'   ? 'error'  :
                type === 'info'    ? 'active'  : ''
            );
        }

        /* ══════════════════════════════════════════════════
        COLOUR UI  — single function, updates every element
        ══════════════════════════════════════════════════ */
        function syncColorUI(hex, name) {
            activeTintHex = hex;
            activeTintName = name;
            tintCache = null; // invalidate tint cache whenever color changes

            const { labelChip, colorName, colorNameMob, tabColorDot } = domRefs;
            if (labelChip) {
                labelChip.style.background = hex || 'transparent';
                labelChip.style.borderColor = hex ? 'rgba(255,255,255,.2)' : 'var(--border-hi)';
            }
            if (colorName) {
                colorName.textContent = name;
                colorName.style.color = hex ? 'var(--text)' : 'var(--muted-hi)';
                colorName.style.background = hex ? 'var(--accent-dim)' : 'transparent';
            }
            if (colorNameMob) {
                colorNameMob.textContent = name;
                colorNameMob.style.color = hex ? 'var(--text)' : 'var(--muted-hi)';
                colorNameMob.style.background = hex ? 'var(--accent-dim)' : 'transparent';
            }
            if (tabColorDot) {
                tabColorDot.style.background = hex || '';
                tabColorDot.style.display = hex ? 'block' : 'none';
            }
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            if (!hex) {
                document.querySelectorAll('.swatch-original').forEach(s => s.classList.add('selected'));
            }
        }
        function applySwatchSelection(id) {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            document.querySelectorAll(`.swatch[data-id="${id}"]`).forEach(s => s.classList.add('selected'));
        }

        /* ══════════════════════════════════════════════════
        TINTING  — result is cached; recomputed only when
        the wheel image or the active tint colour changes
        ══════════════════════════════════════════════════ */
        function getTintedWheelCanvas() {
            const cacheKey = (selectedWheel ? selectedWheel.id : '') + '::' + (activeTintHex || 'original');
            if (tintCache && tintCache.key === cacheKey) return tintCache.canvas;

            const w = wheelImage.width, h = wheelImage.height;
            const off = document.createElement('canvas');
            off.width = w; off.height = h;
            const c2 = off.getContext('2d');
            c2.drawImage(wheelImage, 0, 0);

            if (activeTintHex) {
                const tr = parseInt(activeTintHex.slice(1, 3), 16);
                const tg = parseInt(activeTintHex.slice(3, 5), 16);
                const tb = parseInt(activeTintHex.slice(5, 7), 16);
                const id = c2.getImageData(0, 0, w, h);
                const px = id.data;
                for (let i = 0; i < px.length; i += 4) {
                    if (px[i + 3] === 0) continue;
                    const lum = (px[i] * .2126 + px[i + 1] * .7152 + px[i + 2] * .0722) / 255;
                    px[i]     = Math.round(tr * lum);
                    px[i + 1] = Math.round(tg * lum);
                    px[i + 2] = Math.round(tb * lum);
                }
                c2.putImageData(id, 0, 0);
            }

            tintCache = { key: cacheKey, canvas: off };
            return off;
        }

        /* ══════════════════════════════════════════════════
        SELECT HANDLERS  (shared by desktop + mobile)
        ══════════════════════════════════════════════════ */
        async function selectCar(car) {
            selectedCar = car;
            document.querySelectorAll('.car-item').forEach(el =>
                el.classList.toggle('selected', el.dataset.carId === car.id)
            );
            domRefs.carName.textContent = car.name;
            if (!cvReady) { updateStatus('OpenCV.js ещё инициализируется…', 'info'); return; }
            updateStatus('Загрузка кузова…', 'info');
            try {
                carImage = await loadImage(car.src);
                canvas.width = carImage.width;
                canvas.height = carImage.height;
                ctx.drawImage(carImage, 0, 0);
                cleanSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                canvas.style.display = 'block';
                canvas.classList.add('loaded');
                domRefs.emptyState.style.display = 'none';
                if (selectedWheel) await applyWheelsWithOpenCV();
                else updateStatus('Теперь выберите диски', 'info');
            } catch (e) { updateStatus('Ошибка: ' + e.message, 'error'); }
        }
        async function selectWheel(wheel) {
            selectedWheel = wheel;
            tintCache = null; // new wheel image — invalidate tint cache
            document.querySelectorAll('.wheel-item').forEach(el =>
                el.classList.toggle('selected', el.dataset.wheelId === wheel.id)
            );
            if (!cvReady) { updateStatus('OpenCV.js ещё инициализируется…', 'info'); return; }
            updateStatus('Загрузка диска…', 'info');
            try {
                wheelImage = await loadImage(wheel.src);
                if (selectedCar) await applyWheelsWithOpenCV();
                else updateStatus('Выберите кузов', 'info');
            } catch (e) { updateStatus('Ошибка: ' + e.message, 'error'); }
        }
        async function rerenderWheels() {
            if (selectedCar && selectedWheel && cvReady) {
                await applyWheelsWithOpenCV();
            }
        }

        /* ══════════════════════════════════════════════════
        OPENCV MATCHING
        ══════════════════════════════════════════════════ */
        function analyzeTemplate(image) {
            const c = document.createElement('canvas');
            c.width = image.width;
            c.height = image.height;
            const cx = c.getContext('2d');
            cx.drawImage(image, 0, 0);
            const d = cx.getImageData(0, 0, c.width, c.height).data;
            const pts = [];
            for (let y = 0; y < c.height; y++) for (let x = 0; x < c.width; x++) {
                const i = (y * c.width + x) * 4;
                if ((d[i] + d[i + 1] + d[i + 2]) / 3 > 30) pts.push({ x, y });
            }
            if (!pts.length) return { centerX: c.width / 2, centerY: c.height / 2, radius: Math.min(c.width, c.height) / 2 };
            let sx = 0, sy = 0, mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
            for (const p of pts) {
                sx += p.x; sy += p.y;
                if (p.x < mnX) mnX = p.x; if (p.x > mxX) mxX = p.x;
                if (p.y < mnY) mnY = p.y; if (p.y > mxY) mxY = p.y;
            }
            return { centerX: sx / pts.length, centerY: sy / pts.length, radius: Math.max(mxX - mnX, mxY - mnY) / 2 };
        }
        async function getTemplate() {
            if (commonTemplate) return commonTemplate;
            const img = await loadImage(REPLACE_PART_SRC);
            const b = analyzeTemplate(img);
            commonTemplate = { image: img, ...b };
            return commonTemplate;
        }
        function makeTmpCanvas(img) {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img, 0, 0);
            return c;
        }
        function findTopN(mat, n, minS) {
            const matches = [];
            const { rows, cols } = mat;
            const d = mat.data32F;
            for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
                const s = d[y * cols + x];
                if (s >= minS) matches.push({ x, y, score: s });
            }
            matches.sort((a, b) => b.score - a.score);
            const out = [];
            const MIN_DIST_SQ = 100; // 10² — avoids Math.sqrt in inner loop
            for (const m of matches) {
                let ok = true;
                for (const p of out) {
                    const dx = m.x - p.x, dy = m.y - p.y;
                    if (dx * dx + dy * dy < MIN_DIST_SQ) { ok = false; break; }
                }
                if (ok) { out.push(m); if (out.length >= n) break; }
            }
            return out;
        }
        async function applyWheelsWithOpenCV() {
            if (!carImage || !wheelImage || !selectedCar || !cvReady) return;
            const base = await getTemplate();
            if (!base) {
                updateStatus('Нет шаблона', 'error');
                return;
            }
            const adj = CAR_ADJ[selectedCar.id] || { dx: 0, dy: 0, rs: 1 };
            const tpl = { image: base.image, centerX: base.centerX + adj.dx, centerY: base.centerY + adj.dy, radius: base.radius * adj.rs };
            updateStatus('Поиск колёс…', 'info');
            ctx.putImageData(cleanSnapshot, 0, 0);
            let src = null, tmpl = null, sg = null, tg = null, res = null, ss = null, ts = null;
            try {
                src = cv.imread(makeTmpCanvas(carImage));
                tmpl = cv.imread(makeTmpCanvas(tpl.image));
                sg = new cv.Mat();
                tg = new cv.Mat();
                cv.cvtColor(src, sg, cv.COLOR_RGBA2GRAY);
                cv.cvtColor(tmpl, tg, cv.COLOR_RGBA2GRAY);
                const sc = 0.5;
                ss = new cv.Mat();
                ts = new cv.Mat();
                cv.resize(sg, ss, new cv.Size(Math.round(sg.cols * sc), Math.round(sg.rows * sc)), 0, 0, cv.INTER_AREA);
                cv.resize(tg, ts, new cv.Size(Math.round(tg.cols * sc), Math.round(tg.rows * sc)), 0, 0, cv.INTER_AREA);
                res = new cv.Mat.zeros(ss.rows - ts.rows + 1, ss.cols - ts.cols + 1, cv.CV_32FC1);
                cv.matchTemplate(ss, ts, res, cv.TM_CCOEFF_NORMED);
                cv.normalize(res, res, 0, 1, cv.NORM_MINMAX, -1);
                const msm = findTopN(res, 2, 0.6);
                if (!msm.length) {
                    updateStatus('Колёса не найдены', 'error');
                    return;
                }
                const matches = msm.map(m => ({ x: m.x / sc, y: m.y / sc })).sort((a, b) => a.x - b.x);
                const wsz = tpl.radius * 0.9 * 1.5 * 2;
                const tw = getTintedWheelCanvas();
                for (const m of matches) {
                    ctx.drawImage(tw, 0, 0, tw.width, tw.height,
                        m.x + tpl.centerX - wsz / 2,
                        m.y + tpl.centerY - wsz / 2,
                        wsz, wsz
                    );
                }
                updateStatus('Диски установлены · ' + activeTintName, 'success');
            } catch (e) {
                console.error(e);
                updateStatus('Ошибка OpenCV: ' + e.message, 'error');
            } finally {
                [src, tmpl, sg, tg, res, ss, ts].forEach(m => {
                    try { if (m) m.delete(); } catch (_) { }
                });
            }
        }

        /* ══════════════════════════════════════════════════
        BUILD LISTS  (desktop + mobile share same data-* attrs)
        ══════════════════════════════════════════════════ */
        function makeCarItem(car) {
            const d = document.createElement('div');
            d.className = 'car-item';
            d.dataset.carId = car.id;
            d.setAttribute('role', 'button');
            d.setAttribute('tabindex', '0');
            d.innerHTML = `<img src="${car.src}" alt="${car.name}" loading="lazy"><span class="item-label">${car.name}</span><span class="item-check"></span>`;
            return d;
        }
        function makeWheelItem(wheel) {
            const d = document.createElement('div');
            d.className = 'wheel-item';
            d.dataset.wheelId = wheel.id;
            d.setAttribute('role', 'button');
            d.setAttribute('tabindex', '0');
            d.innerHTML = `<img src="${wheel.src}" alt="${wheel.name}" loading="lazy"><span class="item-label">${wheel.name}</span><span class="item-check"></span><div class="wheel-name">${wheel.name}</div>`;
            return d;
        }
        function makeSwatch(p) {
            const b = document.createElement('button');
            b.className = 'swatch' + (p.id === 'original' ? ' swatch-original' : '');
            b.dataset.id = p.id;
            b.title = p.name;
            b.setAttribute('aria-label', `Выбрать цвет: ${p.name}`);
            if (p.hex) b.style.background = p.hex;
            return b;
        }
        function initLists() {
            const carListD  = document.getElementById('carList');
            const carListM  = document.getElementById('carListMob');
            const whlListD  = document.getElementById('wheelList');
            const whlListM  = document.getElementById('wheelListMob');
            const swGridD   = document.getElementById('swatchGrid');
            const swGridM   = document.getElementById('swatchGridMob');

            // Build all items into DocumentFragments — one DOM insertion per list
            const carFragD = document.createDocumentFragment();
            const carFragM = document.createDocumentFragment();
            CAR_TYPES.forEach(car => {
                const handler = () => { selectCar(car); closeSheet(); };
                const kbHandler = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } };
                [carFragD, carFragM].forEach(frag => {
                    const el = makeCarItem(car);
                    el.onclick = handler;
                    el.onkeydown = kbHandler;
                    frag.appendChild(el);
                });
            });
            carListD.appendChild(carFragD);
            carListM.appendChild(carFragM);

            const whlFragD = document.createDocumentFragment();
            const whlFragM = document.createDocumentFragment();
            WHEEL_TYPES.forEach(wheel => {
                const handler = () => { selectWheel(wheel); closeSheet(); };
                const kbHandler = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } };
                [whlFragD, whlFragM].forEach(frag => {
                    const el = makeWheelItem(wheel);
                    el.onclick = handler;
                    el.onkeydown = kbHandler;
                    frag.appendChild(el);
                });
            });
            whlListD.appendChild(whlFragD);
            whlListM.appendChild(whlFragM);

            const swFragD = document.createDocumentFragment();
            const swFragM = document.createDocumentFragment();
            PALETTE.forEach(p => {
                [swFragD, swFragM].forEach(frag => {
                    const btn = makeSwatch(p);
                    if (p.id === 'original') btn.classList.add('selected');
                    btn.onclick = () => {
                        applySwatchSelection(p.id);
                        syncColorUI(p.hex, p.name);
                        domRefs.pickerWrap.classList.remove('active');
                        domRefs.pickerWrapMob.classList.remove('active');
                        debouncedRerender();
                    };
                    frag.appendChild(btn);
                });
            });
            swGridD.appendChild(swFragD);
            swGridM.appendChild(swFragM);

            function onCustomColor(hex) {
                const name = 'Свой · ' + hex.toUpperCase();
                domRefs.customPicker.value = hex;
                domRefs.customPickerMob.value = hex;
                domRefs.pickerWrap.style.background = hex;
                domRefs.pickerWrapMob.style.background = hex;
                domRefs.pickerWrap.classList.add('active');
                domRefs.pickerWrapMob.classList.add('active');
                applySwatchSelection('__none__');
                syncColorUI(hex, name);
                debouncedRerender();
            }
            domRefs.customPicker.addEventListener('input', e => onCustomColor(e.target.value));
            domRefs.customPickerMob.addEventListener('input', e => onCustomColor(e.target.value));
            syncColorUI(null, 'Оригинал');
        }

        /* ══════════════════════════════════════════════════
        MOBILE SHEET LOGIC
        ══════════════════════════════════════════════════ */
        function openSheet(which) {
            closeSheet();
            const sheet = domRefs.sheets[which];
            if (!sheet) return;
            sheet.classList.add('open');
            domRefs.backdrop.classList.add('open');
            domRefs.tabs[which].classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                const firstFocusable = sheet.querySelector('button, [tabindex="0"]');
                if (firstFocusable) firstFocusable.focus();
            }, 300);
        }
        function closeSheet() {
            Object.values(domRefs.sheets).forEach(s => s.classList.remove('open'));
            domRefs.backdrop.classList.remove('open');
            Object.values(domRefs.tabs).forEach(t => t.classList.remove('active'));
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSheet();
        });

        document.querySelectorAll('.sheet-handle').forEach(handle => {
            let startY = 0;
            handle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            }, { passive: true });
            handle.addEventListener('touchmove', (e) => {
                const deltaY = e.touches[0].clientY - startY;
                if (deltaY > 0) {
                    const sheet = handle.closest('.mob-sheet');
                    const progress = Math.min(1, deltaY / 200);
                    sheet.style.transform = `translateY(${progress * 100}%)`;
                }
            }, { passive: true });
            handle.addEventListener('touchend', (e) => {
                const sheet = handle.closest('.mob-sheet');
                const deltaY = e.changedTouches[0].clientY - startY;
                if (deltaY > 80) {
                    closeSheet();
                } else {
                    sheet.style.transform = 'translateY(0)';
                }
            });
        });

        /* ══════════════════════════════════════════════════
        BOOT
        ══════════════════════════════════════════════════ */
        const debouncedRerender = debounce(rerenderWheels, 60);

        window.onload = function () { initLists(); };

        window.addEventListener('resize', debounce(() => {
            if (carImage && canvas.style.display !== 'none') {
                ctx.drawImage(carImage, 0, 0);
                if (cleanSnapshot) cleanSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                if (selectedWheel && cvReady) applyWheelsWithOpenCV();
            }
        }, 150));

        // Start loading OpenCV immediately
        loadOpenCV();
    </script>
</body>
